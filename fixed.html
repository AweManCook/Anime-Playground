<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Anime Arena Clash</title><style>body{margin:0;background:#07111f;color:#fff;font-family:system-ui;overflow:hidden}canvas{display:block;margin:90px auto 0;border:4px solid #fff;border-radius:14px;background:#111827}#ui{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:min(950px,96vw);display:flex;gap:10px}.card{flex:1;background:#0f172acc;border:1px solid #ffffff44;border-radius:12px;padding:8px}.bar{height:10px;background:#020617;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444)}#menu{position:fixed;inset:0;display:grid;place-items:center;background:#020617ee}.panel{width:min(980px,94vw);max-height:92vh;overflow:auto;background:#0f172a;border:1px solid #ffffff44;border-radius:20px;padding:22px}button,select{font:inherit;border:0;border-radius:10px;padding:10px 14px;color:#fff;background:#334155}button{font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed)}.group{margin:16px 0 8px;font-weight:900;color:#bfdbfe}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}.f{background:#1e293b;border:1px solid #ffffff33;border-radius:12px;padding:10px;cursor:pointer}.p1{outline:3px solid #60a5fa}.p2{box-shadow:inset 0 0 0 3px #fb7185}.small{font-size:12px;color:#cbd5e1}#hint{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#0f172acc;border:1px solid #ffffff33;border-radius:99px;padding:8px 14px;color:#dbeafe;font-size:13px}</style></head><body><div id=ui><div class=card><b id=n1>P1</b> <span id=s1>★★★</span><br><b id=d1>0%</b><div class=bar><div id=h1 class=fill></div></div><div id=c1></div></div><div class=card><b id=n2>P2</b> <span id=s2>★★★</span><br><b id=d2>0%</b><div class=bar><div id=h2 class=fill></div></div><div id=c2></div></div></div><canvas id=cv width=960 height=540></canvas><div id=hint>P1: A/D W jump F light G heavy H special. P2: arrows / . ,</div><div id=menu><div class=panel><h1>Anime Arena Clash</h1><p>Fixed build: visible hitboxes, combo counter, hit-stun, heavy launch, and sound after Start.</p><p><select id=mode><option value=ai>Player vs AI</option><option value=pvp>2 Player PvP</option></select> <select id=diff><option>easy</option><option selected>normal</option><option>hard</option></select> <button id=mute>Sound On</button></p><h3>Click once for P1, twice for P2</h3><div id=sel></div><p><button id=start>Start Battle</button> <button id=rnd style=background:#334155>Random</button></p></div></div><script>
const cv=document.getElementById('cv'),x=cv.getContext('2d'),W=960,H=540,K={},PFS=[{x:140,y:430,w:680,h:30},{x:230,y:320,w:140,h:16},{x:590,y:320,w:140,h:16}],Q=id=>document.getElementById(id);
const R=[['Sorcerer Battles','Limitless Ace','#60a5fa','blindfold pull','blind','pull'],['Sorcerer Battles','Straw Doll Striker','#b45309','nails projectile','nails','nails'],['Demon Blades','Water Blade Rookie','#0284c7','water sword','sword','slash'],['Pirate Journey','Rubber Captain','#dc2626','stretch punches','hat','rubber'],['Pirate Journey','Triple Sword Hunter','#16a34a','three swords','swords','spin'],['Hero Academy','Green Smash Student','#16a34a','green lightning smash','green','smash'],['Hero Academy','Gravity Girl','#f472b6','gravity orbs','gravity','gravity'],['Hunter Exam','Card Trick Magician','#ec4899','playing cards','cards','cards']].map((a,i)=>({grp:a[0],n:a[1],c:a[2],t:a[3],g:a[4],sp:a[5],spd:4.8+(i%3)*.25,j:14.5+(i%2)*.5,w:.95+(i%3)*.08}));

function au(){if(AC)return;AC=new(window.AudioContext||window.webkitAudioContext)();master=AC.createGain();master.gain.value=muted?0:.32;master.connect(AC.destination)}function tone(f,d=.08,type='square',v=.25){if(!AC||muted)return;let o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(master);o.start();o.stop(AC.currentTime+d)}function sfx(t){if(t=='hit')tone(180,.06,'sawtooth',.35);if(t=='heavy')tone(90,.16,'sawtooth',.5);if(t=='sp')tone(650,.16,'triangle',.32);if(t=='jump')tone(520,.08,'triangle',.2)}function song(){if(music)return;let m=[330,392,440,523,440,392,330,294];music=setInterval(()=>{if(state=='play'&&!muted){let i=step++;tone(m[i%m.length],.14,'triangle',.14);if(i%2==0)tone(110,.18,'sawtooth',.08)}},190)}function stop(){clearInterval(music);music=0}
class F{constructor(id,f,x,y){Object.assign(this,{id,f,x,y,w:34,h:62,vx:0,vy:0,dir:id==1?1:-1,dmg:0,stk:3,jmp:2,inv:60,cd:0,stun:0,rag:0,combo:0,cdmg:0,ct:0,ang:0})}cx(){return this.x+17}cy(){return this.y+31}ctrl(){if(mode=='ai'&&this.id==2)return ai(this,a);if(this.id==1)return{l:K.KeyA,r:K.KeyD,j:K.KeyW,li:K.KeyF,he:K.KeyG,sp:K.KeyH};return{l:K.ArrowLeft,r:K.ArrowRight,j:K.ArrowUp,li:K.Slash,he:K.Period,sp:K.Comma}}up(o){tick(this);let c=this.ctrl();if(this.stun<=0&&this.rag<=0){if(c.l){this.vx-=.82;this.dir=-1}if(c.r){this.vx+=.82;this.dir=1}this.vx=Math.max(-this.f.spd,Math.min(this.f.spd,this.vx));if(jp(this.id,c.j)&&this.jmp>0){this.vy=-this.f.j;this.jmp--;sfx('jump')}if(c.li)this.atk(o,0);if(c.he)this.atk(o,1);if(c.sp)this.spc(o)}this.vy+=.72;this.x+=this.vx;this.y+=this.vy;this.vx*=this.rag?.98:.84;if(this.rag)this.ang+=this.vx*.04;this.on=0;for(const p of PFS)land(this,p);if(this.y>700||this.x<-180||this.x>1120)this.ko()}atk(o,heavy){if(this.cd)return;this.cd=heavy?42:15;let w=heavy?82:58,h=heavy?48:34,ox=heavy?42:34,rx=this.dir>0?this.cx()+ox:this.cx()-ox-w,ry=this.cy()-h/2;box(rx,ry,w,h,heavy?'#fb7185':'#fde68a',10);if(rect(o.x,o.y,o.w,o.h,rx,ry,w,h))hit(this,o,heavy?15:6,heavy?23:7,heavy?7:25,heavy)}spc(o){if(this.cd)return;this.cd=58;sfx('sp');let d=this.dir,s=this.f.sp;if(s=='cards'||s=='nails'||s=='rubber'){let n=s=='rubber'?5:s=='cards'?5:4;for(let i=0;i<n;i++)bul.push({own:this,x:this.cx(),y:this.cy()-22+i*9,vx:d*(s=='cards'?8+i:9),vy:s=='nails'?-1+i*.4:0,r:s=='rubber'?10:7,d:5,k:5,st:22,life:95})}else if(s=='gravity'||s=='pull')zone(this,o.cx()-105,o.cy()-85,210,170,6,-9,55,0,35,1);else if(s=='spin')zone(this,this.cx()-90,this.cy()-85,180,170,5,5,18,0,34,0,5);else{let rx=d>0?this.cx()+28:this.cx()-148;zone(this,rx,this.cy()-65,120,125,s=='smash'?22:15,s=='smash'?30:18,s=='smash'?5:15,s=='smash',18)}}ko(){this.stk--;if(this.stk<=0){alert((this.id==1?'Player 2':'Player 1')+' wins');state='menu';Q('menu').style.display='grid';stop()}Object.assign(this,{x:this.id==1?260:660,y:120,vx:0,vy:0,dmg:Math.max(0,this.dmg-35),inv:80,stun:0,rag:0})}draw(){drawF(this)}}
function tick(p){['inv','cd','stun','rag','ct'].forEach(k=>{if(p[k]>0)p[k]--});if(!p.ct){p.combo=0;p.cdmg=0}}function ai(p,o){let dx=o.cx()-p.cx(),ad=Math.abs(dx),r={easy:.035,normal:.075,hard:.15}[diff]||.07,c={};if(ad>72){c.l=dx<0;c.r=dx>0}c.j=Math.random()<.015;c.li=ad<78&&Math.random()<r;c.he=ad<105&&Math.random()<r/3;c.sp=ad<245&&Math.random()<r/4;return c}function hit(at,t,d,k,st,rag){if(t.inv)return;t.dmg+=d;t.vx+=at.dir*(k+t.dmg*.08)/t.f.w;t.vy-=k*.35+2;t.stun=rag?0:st;t.rag=rag?48:0;t.inv=rag?16:6;at.combo++;at.cdmg+=d;at.ct=95;fx.push({x:t.cx(),y:t.cy(),r:rag?48:30,c:at.f.c,life:18});sfx(rag?'heavy':'hit')}function jp(n,v){jp.m=jp.m||{};if(v&&!jp.m[n]){jp.m[n]=1;return 1}if(!v)jp.m[n]=0;return 0}function land(pl,p){if(pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>=p.y&&pl.y+pl.h<=p.y+p.h+24&&pl.vy>=0){pl.y=p.y-pl.h;pl.vy=0;pl.jmp=2}}function box(x,y,w,h,c,l=8){hb.push({x,y,w,h,c,l})}function zone(own,x,y,w,h,d,k,st,rag,life,pull=0,tick=0){hb.push({own,x,y,w,h,d,k,st,rag,life,pull,tick,c:own.f.c,zone:1,l:life})}
function updateBul(){for(let i=bul.length-1;i>=0;i--){let s=bul[i],t=s.own==a?b:a;s.x+=s.vx;s.y+=s.vy;s.vy+=.04;s.life--;box(s.x-s.r,s.y-s.r,s.r*2,s.r*2,'#fde68a',2);if(circle(t,s.x,s.y,s.r)){hit(s.own,t,s.d,s.k,s.st,0);bul.splice(i,1)}else if(s.life<=0)bul.splice(i,1)}}function updateHb(){for(let i=hb.length-1;i>=0;i--){let z=hb[i];if(z.zone){let t=z.own==a?b:a;if((!z.tick||z.l%z.tick==0)&&rect(t.x,t.y,t.w,t.h,z.x,z.y,z.w,z.h)){if(z.pull){t.vx+=(z.own.cx()-t.cx())*.1;t.vy+=(z.own.cy()-t.cy())*.04}hit(z.own,t,z.d,z.k,z.st,z.rag)}}z.l--;if(z.l<=0)hb.splice(i,1)}}
function stage(){world(a?.f.grp||R[pickA][0],0,W/2,'left');world(b?.f.grp||R[pickB][0],W/2,W/2,'right');ctx.fillStyle='#fff6';ctx.fillRect(W/2-2,0,4,H);ctx.fillStyle='#ef444844';ctx.fillRect(0,H-25,W,25);for(const p of PFS){ctx.fillStyle=p.h>20?'#334155':'#475569';round(p.x,p.y,p.w,p.h,8);ctx.fill();ctx.fillStyle=p.h>20?'#64748b':'#94a3b8';round(p.x,p.y,p.w,8,8);ctx.fill()}}function world(s,x,w,side){let m={'Sorcerer Battles':['#312e81','#111827'],'Demon Blades':['#0f766e','#052e16'],'Pirate Journey':['#0284c7','#0c4a6e'],'Hero Academy':['#2563eb','#111827'],'Hunter Exam':['#16a34a','#1e1b4b']}[s]||['#4c1d95','#164e63'];let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,m[0]);g.addColorStop(1,m[1]);ctx.fillStyle=g;ctx.fillRect(x,0,w,H);ctx.fillStyle='#fff2';for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(x+i*90+40,230-(i%2)*40,35,0,7);ctx.fill()}ctx.fillStyle='#fff';ctx.font='900 18px system-ui';ctx.textAlign=side=='left'?'left':'right';ctx.fillText(s,x+(side=='left'?18:w-18),32)}
function drawF(p){ctx.save();ctx.translate(p.cx(),p.cy());if(p.rag)ctx.rotate(p.ang);if(p.inv&&Math.floor(p.inv/5)%2==0)ctx.globalAlpha=.5;ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(0,35,30,8,0,0,7);ctx.fill();ctx.fillStyle=p.f.c;round(-17,-11,34,44,10);ctx.fill();ctx.fillStyle='#f8dcc2';ctx.beginPath();ctx.arc(0,-20,17,0,7);ctx.fill();ctx.fillStyle='#111827';for(let i=-2;i<3;i++){ctx.beginPath();ctx.moveTo(i*7,-25);ctx.lineTo(i*7+5,-45);ctx.lineTo(i*7+12,-23);ctx.fill()}gear(p);ctx.restore()}function gear(p){let g=p.f.g,d=p.dir;if(g=='blind'){ctx.fillStyle='#020617';ctx.fillRect(-18,-26,36,10);aura(p.f.c)}else if(g=='hat'){ctx.fillStyle='#facc15';ctx.beginPath();ctx.ellipse(0,-35,30,7,0,0,7);ctx.fill()}else if(g=='cards'){for(let i=0;i<4;i++){ctx.fillStyle=i%2?'#ef4444':'#f8fafc';ctx.fillRect(d*(16+i*7),-2+i*5,10,14)}}else if(g=='gravity'){ctx.fillStyle='#fbcfe8';ctx.beginPath();ctx.arc(-18,10,7,0,7);ctx.arc(18,10,7,0,7);ctx.fill();aura('#f472b6')}else if(g=='green'){aura('#22c55e');ctx.strokeStyle='#86efac';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-22,-30);ctx.lineTo(-8,-43);ctx.lineTo(-12,-26);ctx.lineTo(8,-38);ctx.stroke()}else if(g=='swords'||g=='sword'){sword(20*d,16,d,p.f.c);if(g=='swords'){sword(-20,18,-1,'#d1fae5');sword(20,18,1,'#d1fae5')}}else if(g=='nails'){ctx.fillStyle='#e5e7eb';for(let i=0;i<3;i++)ctx.fillRect(-20+i*7,18,3,12)}else aura(p.f.c);ctx.fillStyle='#020617';if(g!='blind')ctx.fillRect(d*4-2,-21,4,3)}function sword(a,b,d,c){ctx.strokeStyle=c;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(a+d*32,b-28);ctx.stroke()}function aura(c){ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,10,24,.2,2.7);ctx.stroke();ctx.beginPath();ctx.arc(0,10,30,3.4,5.9);ctx.stroke()}
function drawExtras(){for(const s of bul){ctx.fillStyle=s.own.f.c;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill()}for(let i=fx.length-1;i>=0;i--){let f=fx[i];f.life--;ctx.globalAlpha=f.life/18;ctx.strokeStyle=f.c;ctx.lineWidth=6;ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,7);ctx.stroke();ctx.globalAlpha=1;if(f.life<=0)fx.splice(i,1)}for(const h of hb){ctx.save();ctx.globalAlpha=.35;ctx.strokeStyle=h.c;ctx.lineWidth=3;ctx.strokeRect(h.x,h.y,h.w,h.h);ctx.globalAlpha=.12;ctx.fillStyle=h.c;ctx.fillRect(h.x,h.y,h.w,h.h);ctx.restore()}}
function ui(){Q('n1').textContent=a.f.n;Q('n2').textContent=(mode=='ai'?'AI: ':'')+b.f.n;Q('d1').textContent=Math.floor(a.dmg)+'%';Q('d2').textContent=Math.floor(b.dmg)+'%';Q('s1').textContent='★'.repeat(a.stk);Q('s2').textContent='★'.repeat(b.stk);Q('h1').style.width=Math.max(0,100-a.dmg/2)+'%';Q('h2').style.width=Math.max(0,100-b.dmg/2)+'%';Q('c1').textContent=a.combo>=2?a.combo+' hit combo · '+a.cdmg+' dmg':'';Q('c2').textContent=b.combo>=2?b.combo+' hit combo · '+b.cdmg+' dmg':''}function loop(){requestAnimationFrame(loop);ctx.clearRect(0,0,W,H);stage();if(state=='play'){a.up(b);b.up(a);updateBul();updateHb()}drawExtras();a.draw();b.draw();ui()}
function build(){let s=Q('sel');s.innerHTML='';[...new Set(F.map(f=>f.grp))].forEach(gr=>{let h=document.createElement('div');h.className='group';h.textContent=gr;s.appendChild(h);let g=document.createElement('div');g.className='grid';F.forEach((f,i)=>{if(f.grp!=gr)return;let e=document.createElement('div');e.className='f';e.dataset.i=i;e.innerHTML='<div class=name>'+f.n+'</div><div class=small>'+f.t+'</div>';e.onclick=()=>{if(next==1){pickA=i;next=2}else{pickB=i;next=1}sel()};g.appendChild(e)});s.appendChild(g)});sel()}function sel(){document.querySelectorAll('.f').forEach(e=>{let i=+e.dataset.i;e.classList.toggle('p1',i==pickA);e.classList.toggle('p2',i==pickB)})}function start(){initAudio();if(AC.state=='suspended')AC.resume();musicOn();mode=Q('mode').value;diff=Q('diff').value;a=new Ftr(1,F[pickA],260,120);b=new Ftr(2,F[pickB],660,120);bul=[];zones=[];hb=[];state='play';Q('menu').style.display='none';tone(523,.12,'square',.3)}const Ftr=P;function Q(id){return document.getElementById(id)}function show(t){Q('msg').innerHTML=t;Q('msg').style.opacity=1;setTimeout(()=>Q('msg').style.opacity=0,1200)}function round(a,b,w,h,r){ctx.beginPath();ctx.moveTo(a+r,b);ctx.arcTo(a+w,b,a+w,b+h,r);ctx.arcTo(a+w,b+h,a,b+h,r);ctx.arcTo(a,b+h,a,b,r);ctx.arcTo(a,b,a+w,b,r);ctx.closePath()}function rect(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}function rects(...v){return rect(...v)}function circle(t,x,y,r){let nx=Math.max(t.x,Math.min(x,t.x+t.w)),ny=Math.max(t.y,Math.min(y,t.y+t.h));return Math.hypot(x-nx,y-ny)<r}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}addEventListener('keydown',e=>{keys[e.code]=1;if(e.code=='Escape'){Q('menu').style.display='grid';state='menu';musicOff()}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=0);Q('start').onclick=start;Q('rand').onclick=()=>{pickA=Math.random()*F.length|0;do{pickB=Math.random()*F.length|0}while(pickB==pickA);sel()};Q('mute').on
