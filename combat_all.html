function drawF(p){X.save();X.translate(p.cx(),p.cy());if(p.rag)X.rotate(p.ang);if(p.inv&&Math.floor(p.inv/5)%2==0)X.globalAlpha=.5;X.fillStyle='#0005';X.beginPath();X.ellipse(0,35,30,8,0,0,7);X.fill();X.fillStyle=p.broken?'#7f1d1d':p.f.c;round(-17,-11,34,44,10);X.fill();X.fillStyle='#f8dcc2';X.beginPath();X.arc(0,-20,17,0,7);X.fill();X.fillStyle='#111827';for(let i=-2;i<3;i++){X.beginPath();X.moveTo(i*7,-25);X.lineTo(i*7+5,-45);X.lineTo(i*7+12,-23);X.fill()}gear(p);if(p.stun>0||p.broken){X.strokeStyle=p.broken?'#fb7185':'#fde68a';X.lineWidth=4;X.beginPath();X.arc(0,0,48+Math.sin(Date.now()/80)*5,0,7);X.stroke();X.font='900 18px Trebuchet MS';X.textAlign='center';X.fillStyle=p.broken?'#fb7185':'#fde68a';X.strokeStyle='#020617';X.lineWidth=5;let lab=p.broken?'BROKEN':'STUN '+p.stun;X.strokeText(lab,0,-55);X.fillText(lab,0,-55)}if(p.adapt>0){X.strokeStyle='#e5e7eb';X.lineWidth=5;X.beginPath();X.arc(0,0,60,0,7);X.stroke();X.fillStyle='#e5e7eb';X.font='900 15px Trebuchet MS';X.textAlign='center';X.fillText('ADAPT '+Math.ceil(p.adapt/60),0,-70)}X.restore()}function gear(p){let g=p.f.g,d=p.dir;if(g=='blind'){X.fillStyle='#020617';X.fillRect(-18,-26,36,10);aura(p.f.c)}else if(g=='wheel'){X.strokeStyle='#e5e7eb';X.lineWidth=4;X.beginPath();X.arc(0,-53,17,0,7);X.stroke();for(let i=0;i<8;i++){let a=i*Math.PI/4;X.beginPath();X.moveTo(Math.cos(a)*5,-53+Math.sin(a)*5);X.lineTo(Math.cos(a)*17,-53+Math.sin(a)*17);X.stroke()}aura('#e5e7eb')}else if(g=='staff'){staff(24*d,20,d,p.f.c);aura('#d8b4fe')}else if(g=='wand'){staff(20*d,14,d,p.f.c);X.fillStyle='#93c5fd';X.beginPath();X.arc(28*d,-22,5,0,7);X.fill()}else if(g=='axe'){X.strokeStyle='#7c2d12';X.lineWidth=5;X.beginPath();X.moveTo(20*d,22);X.lineTo(35*d,-30);X.stroke();X.fillStyle='#e5e7eb';X.beginPath();X.ellipse(37*d,-34,18,11,.6*d,0,7);X.fill()}else if(g=='hat'){X.fillStyle='#facc15';X.beginPath();X.ellipse(0,-35,30,7,0,0,7);X.fill()}else if(g=='book'){X.fillStyle='#111';X.fillRect(-26,8,20,24);X.strokeStyle='#ef4444';X.strokeRect(-26,8,20,24)}else if(g=='detective'){X.fillStyle='#f8fafc';X.beginPath();X.ellipse(0,-35,26,7,0,0,7);X.fill();X.strokeStyle='#111';X.lineWidth=2;X.beginPath();X.arc(-6,-20,5,0,7);X.arc(8,-20,5,0,7);X.stroke()}else if(g=='apple'){X.fillStyle='#ef4444';X.beginPath();X.arc(22,-4,8,0,7);X.fill()}else if(g=='cards'){for(let i=0;i<4;i++){X.fillStyle=i%2?'#ef4444':'#f8fafc';X.fillRect(d*(16+i*7),-2+i*5,10,14)}}else if(g=='gravity'){X.fillStyle='#fbcfe8';X.beginPath();X.arc(-18,10,7,0,7);X.arc(18,10,7,0,7);X.fill();aura('#f472b6')}else if(g=='green'){aura('#22c55e');X.strokeStyle='#86efac';X.lineWidth=3;X.beginPath();X.moveTo(-22,-30);X.lineTo(-8,-43);X.lineTo(-12,-26);X.lineTo(8,-38);X.stroke()}else if(g=='swords'||g=='sword'){sword(20*d,16,d,p.f.c);if(g=='swords'){sword(-20,18,-1,'#d1fae5');sword(20,18,1,'#d1fae5')}}else if(g=='nails'){X.fillStyle='#e5e7eb';for(let i=0;i<3;i++)X.fillRect(-20+i*7,18,3,12)}else aura(p.f.c);X.fillStyle='#020617';if(g!='blind')X.fillRect(d*4-2,-21,4,3)}function staff(a,b,d,c){X.strokeStyle=c;X.lineWidth=4;X.beginPath();X.moveTo(a,b);X.lineTo(a+d*32,b-45);X.stroke()}function sword(a,b,d,c){X.strokeStyle=c;X.lineWidth=4;X.beginPath();X.moveTo(a,b);X.lineTo(a+d*32,b-28);X.stroke()}function aura(c){X.strokeStyle=c;X.lineWidth=3;X.beginPath();X.arc(0,10,24,.2,2.7);X.stroke();X.beginPath();X.arc(0,10,30,3.4,5.9);X.stroke()}
