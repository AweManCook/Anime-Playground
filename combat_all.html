class F{constructor(id,f,x,y){Object.assign(this,{id,f,x,y,w:34,h:62,vx:0,vy:0,dir:id==1?1:-1,hp:100,jmp:2,inv:45,cd:0,stun:0,rag:0,adapt:0,combo:0,ct:0,ang:0,spHeld:0,slam:0,tp:0})}cx(){return this.x+17}cy(){return this.y+31}ctrl(){if(mode=='ai'&&this.id==2)return bot(this,A);if(this.id==1)return{l:K.KeyA,r:K.KeyD,j:K.KeyW,li:K.KeyF,he:K.KeyG,sp:K.KeyH};return{l:K.ArrowLeft,r:K.ArrowRight,j:K.ArrowUp,li:K.Slash,he:K.Period,sp:K.Comma}}update(o){tick(this);let c=this.ctrl();if(this.stun<=0&&this.rag<=0){if(c.l){this.vx-=.82;this.dir=-1}if(c.r){this.vx+=.82;this.dir=1}this.vx=Math.max(-this.f.spd,Math.min(this.f.spd,this.vx));if(jp(this.id,c.j)&&this.jmp>0){this.vy=-this.f.j;this.jmp--;sfx('jump')}if(c.li)this.atk(o,0);if(c.he)this.atk(o,1);if(c.sp&&!this.spHeld)this.special(o);this.spHeld=!!c.sp}else this.spHeld=!!c.sp;if(this.slam==1&&this.vy>1)this.slam=2;if(this.slam==2){this.vy+=.9;box(this.cx()-32,this.cy()-8,64,90,'#fb923c',3)}this.vy+=GR;this.x+=this.vx;this.y+=this.vy;this.x=Math.max(0,Math.min(WW-this.w,this.x));this.vx*=this.rag?.98:.84;if(this.rag)this.ang+=this.vx*.04;for(const p of PL)land(this,p,o);portals(this);if(this.y>WH+160){this.hp-=12;this.respawn();if(this.hp<=0)finish(o.id==1?'Player 1 Wins!':'Player 2 Wins!')}}atk(o,heavy){if(this.cd)return;this.cd=heavy?34:9;let w=heavy?92:76,h=heavy?54:44,ox=heavy?38:18,rx=this.dir>0?this.cx()+ox:this.cx()-ox-w,ry=this.cy()-h/2;box(rx,ry,w,h,heavy?'#fb7185':'#fde68a',10);slash(this.cx()+this.dir*42,this.cy(),this.f.c,heavy);if(rect(o.x,o.y,o.w,o.h,rx,ry,w,h))hit(this,o,heavy?10:4,heavy?13:5,heavy?8:25,heavy)}special(o){if(this.cd)return;call(this.f.move);sfx('sp');let d=this.dir,s=this.f.sp;if(s=='blue'){this.cd=135;zone(this,this.cx()-100,this.cy()-75,200,150,2,-3,22,0,18,1,4);return}if(s=='adapt'){this.cd=185;this.adapt=120;this.vx+=d*10;let rx=d>0?this.cx()+20:this.cx()-170,ry=this.cy()-62,rw=150,rh=124;box(rx,ry,rw,rh,'#e5e7eb',24);wheelFx(this.cx()+d*80,this.cy(),this.f.c);if(rect(o.x,o.y,o.w,o.h,rx,ry function tick(p){['inv','cd','stun','rag','ct','adapt','tp'].forEach(k=>{if(p[k]>0)p[k]--});if(!p.ct)p.combo=0}function bot(p,o){let dx=o.cx()-p.cx(),ad=Math.abs(dx),r={easy:.035,normal:.075,hard:.15}[diff]||.07,c={};if(ad>78){c.l=dx<0;c.r=dx>0}c.j=Math.random()<.025;c.li=ad<85&&Math.random()<r;c.he=ad<115&&Math.random()<r/3;c.sp=ad<360&&Math.random()<r/4;return c}function hit(a,t,d,k,st,rag){if(t.adapt>0){burst(t.cx(),t.cy(),t.f.c,10);box(t.x-12,t.y-12,t.w+24,t.h+24,'#e5e7eb',6);return}if(t.inv&&st<30)return;t.hp-=d;if(t.hp<=0){finish(a.id==1?'Player 1 Wins!':'Player 2 Wins!');return}t.vx+=a.dir*k/t.f.w;t.vy-=k*.32+1;t.stun=rag?0:st;t.rag=rag?38:0;t.inv=rag?10:2;a.combo++;a.ct=70;text(a.combo+' HIT',t.cx(),t.y-20,a.f.c);fx.push({x:t.cx(),y:t.cy(),r:rag?52:30,c:a.f.c,life:18});burst(t.cx(),t.cy(),a.f.c,rag?20:10);shake=Math.max(shake,rag?10:4);sfx(rag?'heavy':'hit')}function jp(n,v){jp.m=jp.m||{};if(v&&!jp.m[n]){jp.m[n]=1;return 1}if(!v)jp.m[n]=0;return 0}function land(pl,p,o){if(pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>=p.y&&pl.y+pl.h<=p.y+p.h+28&&pl.vy>=0){pl.y=p.y-pl.h;pl.vy=0;pl.jmp=2;if(pl.slam==2)pl.slamImpact(o)}}function portals(p){if(p.tp)return;for(let i=0;i<PO.length;i++){let q=PO[i];if(Math.hypot(p.cx()-q.x,p.cy()-q.y)<36){let to=PO[q.to];p.x=to.x-p.w/2;p.y=to.y-p.h/2;p.tp=70;burst(p.cx(),p.cy(),q.c,28);call('PORTAL');break}}}function box(x,y,w,h,c,l=8){hb.push({x,y,w,h,c,l})}function beam(x,y,w,h,c,o,own,d,st){hb.push({x,y,w,h,c,l:13,beam:1});fx.push({x:x+w/2,y:y+h/2,r:w/2,c,life:10,beam:1});if(rect(o.x,o.y,o.w,o.h,x,y,w,h))hit(own,o,d,8,st,false)}function zone(own,x,y,w,h,d,k,st,rag,life,pull=0,tick=0){hb.push({own,x,y,w,h,d,k,st,rag,life,pull,tick,c:own.f.c,zone:1,l:life})}function wheelFx(x,y,c){fx.push({x,y,r:48,c,life:16,wheel:1})}
function updateBul(){for(let i=bul.length-1;i>=0;i--){let s=bul[i],t=s.own==A?B:A;s.x+=s.vx;s.y+=s.vy;s.vy+=s.bomb?.5:.04;s.life--;box(s.x-s.r,s.y-s.r,s.r*2,s.r*2,s.c||'#fde68a',2);if(circle(t,s.x,s.y,s.r)||s.y>920){if(s.bomb){burst(s.x,s.y,s.c,25);box(s.x-48,s.y-48,96,96,s.c,16);if(rect(t.x,t.y,t.w,t.h,s.x-48,s.y-48,96,96))hit(s.own,t,s.d,s.k,s.st,0)}else hit(s.own,t,s.d,s.k,s.st,0);bul.splice(i,1)}else if(s.life<=0)bul.splice(i,1)}}function updateHb(){for(let i=hb.length-1;i>=0;i--){let z=hb[i];if(z.zone){let t=z.own==A?B:A;if((!z.tick||z.l%z.tick==0)&&rect(t.x,t.y,t.w,t.h,z.x,z.y,z.w,z.h)){if(z.pull){t.vx+=(z.own.cx()-t.cx())*.08;t.vy+=(z.own.cy()-t.cy())*.03}hit(z.own,t,z.d,z.k,z.st,z.rag)}}z.l--;if(z.l<=0)hb.splice(i,1)}}function updateMind(){for(let i=marks.length-1;i>=0;i--){let m=marks[i];m.l--;text('✎',m.t.cx()-6,m.t.y-35,m.c);if(m.l<=0){burst(m.t.cx(),m.t.cy(),m.c,30);hit(m.own,m.t,16,4,75,false);marks.splice(i,1)}}for(let i=traps.length-1;i>=0;i--){let tr=traps[i],t=tr.own==A?B:A;tr.l--;box(tr.x,tr.y,tr.w,tr.h,tr.c,2);if(rect(t.x,t.y,t.w,t.h,tr.x,tr.y,tr.w,tr.h)){text('DEDUCED',t.cx()-50,t.y-30,tr.c);hit(tr.own,t,9,3,90,false);traps.splice(i,1)}else if(tr.l<=0)traps.splice(i,1)}}
function camX(p,vw=960){return Math.max(0,Math.min(WW-vw,p.cx()-vw/2))}function camY(p){return Math.max(0,Math.min(WH-H,p.cy()-H/2))}function view(x0,y0,w,h,cx,cy,label){X.save();X.beginPath();X.rect(x0,y0,w,h);X.clip();X.translate(x0-cx,y0-cy);drawWorld(cx,cy,w,h);drawEx();A.draw();B.draw();X.restore();X.strokeStyle='#ffffff88';X.lineWidth=4;X.strokeRect(x0,y0,w,h);X.fillStyle='#fff';X.font='900 16px Trebuchet MS';X.fillText(label,x0+12,y0+24)}function draw(){X.save();if(shake>0){X.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.82;if(shake<.4)shake=0}X.clearRect(0,0,W,H);let far=Math.abs(A.cx()-B.cx())>780;if(far){view(0,0,W/2,H,camX(A,W/2),camY(A),'P1');view(W/2,0,W/2,H,camX(B,W/2),camY(B),'P2');X.fillStyle='#fff';X.fillRect(W/2-2,0,4,H)}else{let mid={cx:()=> (A.cx()+B.cx())/2, cy:()=> (A.cy()+B.cy())/2};view(0,0,W,H,camX(mid,W),camY(mid),'MERGED CAMERA')}X.restore()}function drawWorld(){let g=X.createLinearGradient(0,0,0,WH);g.addColorStop(0,'#111827');g.addColorStop(.55,'#1e1b4b');g.addColorStop(1,'#020617');X.fillStyle=g;X.fillRect(0,0,WW,WH);X.fillStyle='#fff1';for(let i=0;i<80;i++){X.fillRect((i*173)%WW,(i*97)%620,3,3)}X.strokeStyle='#ffffff12';for(let x=0;x<WW;x+=120){X.beginPath();X.moveTo(x,0);X.lineTo(x,WH);X.stroke()}for(const p of PL){X.fillStyle=p.h>30?'#334155':'#475569';round(p.x,p.y,p.w,p.h,8);X.fill();X.fillStyle='#94a3b8';X.fillRect(p.x,p.y,p.w,6)}for(const p of PO){X.strokeStyle=p.c;X.lineWidth=6;X.beginPath();X.arc(p.x,p.y,28,0,7);X.stroke();X.lineWidth=2;X.beginPath();X.arc(p.x,p.y,18,0,7);X.stroke()}}
function drawF(p){X.save();X.translate(p.cx(),p.cy());if(p.rag)X.rotate(p.ang);if(p.inv&&Math.floor(p.inv/5)%2==0)X.globalAlpha=.5;X.fillStyle='#0005';X.beginPath();X.ellipse(0,35,30,8,0,0,7);X.fill();X.fillStyle=p.f.c;round(-17,-11,34,44,10);X.fill();X.fillStyle='#f8dcc2';X.beginPath();X.arc(0,-20,17,0,7);X.fill();X.fillStyle='#111827';for(let i=-2;i<3;i++){X.beginPath();X.moveTo(i*7,-25);X.lineTo(i*7+5,-45);X.lineTo(i*7+12,-23);X.fill()}gear(p);if(p.stun>0){X.strokeStyle='#fde68a';X.lineWidth=4;X.beginPath();X.arc(0,0,48+Math.sin(Date.now()/80)*5,0,7);X.stroke();X.font='900 18px Trebuchet MS';X.textAlign='center';X.fillStyle='#fde68a';X.strokeStyle='#020617';X.lineWidth=5;X.strokeText('STUN '+p.stun,0,-55);X.fillText('STUN '+p.stun,0,-55)}if(p.adapt>0){X.strokeStyle='#e5e7eb';X.lineWidth=5;X.beginPath();X.arc(0,0,60,0,7);X.stroke();X.fillStyle='#e5e7eb';X.font='900 15px Trebuchet MS';X.textAlign='center';X.fillText('ADAPT '+Math.ceil(p.adapt/60),0,-70)}X.restore()}function gear(p){let g=p.f.g,d=p.dir;if(g=='blind'){X.fillStyle='#020617';X.fillRect(-18,-26,36,10);aura(p.f.c)}else if(g=='wheel'){X.strokeStyle='#e5e7eb';X.lineWidth=4;X.beginPath();X.arc(0,-53,17,0,7);X.stroke();for(let i=0;i<8;i++){let a=i*Math.PI/4;X.beginPath();X.moveTo(Math.cos(a)*5,-53+Math.sin(a)*5);X.lineTo(Math.cos(a)*17,-53+Math.sin(a)*17);X.stroke()}aura('#e5e7eb')}else if(g=='staff'||g=='wand'){staff(22*d,18,d,p.f.c);aura(p.f.c)}else if(g=='axe'){X.strokeStyle='#7c2d12';X.lineWidth=5;X.beginPath();X.moveTo(20*d,22);X.lineTo(35*d,-30);X.stroke();X.fillStyle='#e5e7eb';X.beginPath();X.ellipse(37*d,-34,18,11,.6*d,0,7);X.fill()}else if(g=='hat'){X.fillStyle='#facc15';X.beginPath();X.ellipse(0,-35,30,7,0,0,7);X.fill()}else if(g=='book'){X.fillStyle='#111';X.fillRect(-26,8,20,24);X.strokeStyle='#ef4444';X.strokeRect(-26,8,20,24)}else if(g=='detective'){X.fillStyle='#f8fafc';X.beginPath();X.ellipse(0,-35,26,7,0,0,7);X.fill()}else if(g=='apple'){X.fillStyle='#ef4444';X.beginPath();X.arc(22,-4,8,0,7);X.fill()}else if(g=='cards'){for(let i=0;i<4;i++){X.fillStyle=i%2?'#ef4444':'#f8fafc';X.fillRect(d*(16+i*7),-2+i*5,10,14)}}else if(g=='gravity'||g=='green')aura(p.f.c);else if(g=='swords'||g=='sword'){sword(20*d,16,d,p.f.c);if(g=='swords'){sword(-20,18,-1,'#d1fae5');sword(20,18,1,'#d1fae5')}}else if(g=='nails'){X.fillStyle='#e5e7eb';for(let i=0;i<3;i++)X.fillRect(-20+i*7,18,3,12)}X.fillStyle='#020617';if(g!='blind')X.fillRect(d*4-2,-21,4,3)}function staff(a,b,d,c){X.strokeStyle=c;X.lineWidth=4;X.beginPath();X.moveTo(a,b);X.lineTo(a+d*32,b-45);X.stroke()}function sword(a,b,d,c){X.strokeStyle=c;X.lineWidth=4;X.beginPath();X.moveTo(a,b);X.lineTo(a+d*32,b-28);X.stroke()}function aura(c){X.strokeStyle=c;X.lineWidth=3;X.beginPath();X.arc(0,10,24,.2,2.7);X.stroke();X.beginPath();X.arc(0,10,30,3.4,5.9);X.stroke()}
function burst(x0,y,c,n){for(let i=0;i<n;i++)pt.push({x:x0,y,vx:(Math.random()-.5)*10,vy:(Math.random()-.7)*9,c,l:24+Math.random()*12,s:2+Math.random()*4})}function slash(x0,y,c,heavy){fx.push({x:x0,y,r:heavy?44:28,c,life:10,slash:1})}function text(t,x0,y,c){txt.push({t,x:x0,y,c,l:45})}function call(t){let e=$('call');e.textContent=t;e.style.opacity=1;clearTimeout(call.t);call.t=setTimeout(()=>e.style.opacity=0,900)}function drawEx(){for(const tr of traps){X.globalAlpha=.45;X.fillStyle=tr.c;X.fillRect(tr.x,tr.y,tr.w,tr.h);X.globalAlpha=1}for(const s of bul){X.fillStyle=s.c||s.own.f.c;X.beginPath();X.arc(s.x,s.y,s.r,0,7);X.fill()}for(let i=pt.length-1;i>=0;i--){let p=pt[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.35;p.l--;X.globalAlpha=Math.max(0,p.l/30);X.fillStyle=p.c;X.beginPath();X.arc(p.x,p.y,p.s,0,7);X.fill();X.globalAlpha=1;if(p.l<=0)pt.splice(i,1)}for(let i=fx.length-1;i>=0;i--){let f=fx[i];f.life--;X.globalAlpha=f.life/18;X.strokeStyle=f.c;X.lineWidth=f.beam?14:f.slash?5:6;X.beginPath();if(f.beam){X.moveTo(f.x-f.r,f.y);X.lineTo(f.x+f.r,f.y)}else if(f.wheel){X.arc(f.x,f.y,f.r,0,7);for(let j=0;j<8;j++){let a=j*Math.PI/4;X.moveTo(f.x,f.y);X.lineTo(f.x+Math.cos(a)*f.r,f.y+Math.sin(a)*f.r)}}else X.arc(f.x,f.y,f.r,0,7);X.stroke();X.globalAlpha=1;if(f.life<=0)fx.splice(i,1)}for(let i=txt.length-1;i>=0;i--){let t=txt[i];t.y-=.8;t.l--;X.globalAlpha=t.l/45;X.font='900 24px Trebuchet MS';X.fillStyle=t.c;X.strokeStyle='#020617';X.lineWidth=6;X.strokeText(t.t,t.x-32,t.y);X.fillText(t.t,t.x-32,t.y);X.globalAlpha=1;if(t.l<=0)txt.splice(i,1)}for(const h of hb){X.globalAlpha=h.beam?.45:.35;X.strokeStyle=h.c;X.lineWidth=h.beam?6:3;X.strokeRect(h.x,h.y,h.w,h.h);X.globalAlpha=.12;X.fillStyle=h.c;X.fillRect(h.x,h.y,h.w,h.h);X.globalAlpha=1}}
function ui(){$('n1').textContent=A.f.n;$('n2').textContent=(mode=='ai'?'AI: ':'')+B.f.n;$('m1').textContent=Math.max(0,Math.ceil(A.hp))+' HP';$('m2').textContent=Math.max(0,Math.ceil(B.hp))+' HP';$('hp1').style.width=Math.max(0,A.hp)+'%';$('hp2').style.width=Math.max(0,B.hp)+'%';$('st1').textContent=A.rag?'RAGDOLL':A.stun?'STUN '+A.stun:A.combo>=2?A.combo+' HIT':'READY';$('st2').textContent=B.rag?'RAGDOLL':B.stun?'STUN '+B.stun:B.combo>=2?B.combo+' HIT':'READY'}function loop(){requestAnimationFrame(loop);if(state=='play'){A.update(B);B.update(A);updateBul();updateHb();updateMind()}draw();ui()}
function build(){let s=$('sel');s.innerHTML='';[...new Set(CH.map(f=>f.grp))].forEach(gr=>{let h=document.createElement('div');h.className='group';h.textContent=gr;s.appendChild(h);let g=document.createElement('div');g.className='grid';CH.forEach((f,i)=>{if(f.grp!=gr)return;let e=document.createElement('div');e.className='pick';e.dataset.i=i;e.innerHTML='<b>'+f.n+'</b><div class=small>'+f.move+'</div>';e.onclick=()=>{if(next==1){pA=i;next=2}else{pB=i;next=1}sel()};g.appendChild(e)});s.appendChild(g)});sel()}function sel(){document.querySelectorAll('.pick').forEach(e=>{let i=+e.dataset.i;e.classList.toggle('p1',i==pA);e.classList.toggle('p2',i==pB)})}function start(){au();if(AC.state=='suspended')AC.resume();mus();mode=$('mode').value;diff=$('diff').value;A=new F(1,CH[pA],180,620);B=new F(2,CH[pB],WW-260,620);bul=[];hb=[];fx=[];pt=[];txt=[];marks=[];traps=[];state='play';$('menu').style.display='none';$('win').style.display='none';tone(523,.12,'square',.3)}function finish(t){state='over';stopMus();$('wt').textContent=t;$('win').style.display='grid'}function round(a,b,w,h,r){X.beginPath();X.moveTo(a+r,b);X.arcTo(a+w,b,a+w,b+h,r);X.arcTo(a+w,b+h,a,b+h,r);X.arcTo(a,b+h,a,b,r);X.arcTo(a,b,a+w,b,r);X.closePath()}function rect(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}function circle(t,x0,y,r){let nx=Math.max(t.x,Math.min(x0,t.x+t.w)),ny=Math.max(t.y,Math.min(y,t.y+t.h));return Math.hypot(x0-nx,y-ny)<r}
addEventListener('keydown',e=>{K[e.code]=1;if(e.code=='Escape'){$('menu').style.display='grid';$('win').style.display='none';state='menu';stopMus()}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>K[e.code]=0);$('start').onclick=start;$('again').onclick=start;$('back').onclick=()=>{$('win').style.display='none';$('menu').style.display='grid';state='menu'};$('rnd').onclick=()=>{pA=Math.random()*CH.length|0;do{pB=Math.random()*CH.length|0}while(pB==pA);sel()};$('mute').onclick=()=>{muted=!muted;$('mute').textContent='Sound '+(muted?'Off':'On');if(master)master.gain.value=muted?0:.3};$('secret').onclick=()=>{if(!CH.some(c=>c.n=='Speedster')){CH.push({grp:'Secret',n:'Speedster',c:'#ef4444',move:'SAY WALLAHI BRO',g:'green',sp:'speed',spd:6.2,j:15.5,w:.9});build();call('SECRET UNLOCKED: SPEEDSTER')}};build();A=new F(1,CH[pA],180,620);B=new F(2,CH[pB],WW-260,620);loop();
