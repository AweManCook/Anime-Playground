<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anime Arena Clash Named Moves</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050816}iframe{width:100%;height:100%;border:0}</style></head><body><iframe id="g" src="combat_fixed.html"></iframe><script>
const f=document.getElementById('g');
f.onload=()=>{const d=f.contentDocument,s=d.createElement('script');s.textContent=`(function(){const names={'Limitless Ace':'Lapse Blue','Straw Doll Striker':'Nail Shot: Resonance','Water Blade Rookie':'Water Wheel','Rubber Captain':'Gum-Gum Barrage','Triple Sword Hunter':'Three-Sword Cyclone','Green Smash Student':'All For One Smash','Gravity Girl':'Zero Gravity Field','Card Trick Magician':'Card Storm'};try{CH.forEach(c=>{if(names[c.n])c.move=names[c.n]})}catch(e){}function title(t){let e=document.getElementById('moveTitle');if(!e){e=document.createElement('div');e.id='moveTitle';e.style.cssText='position:fixed;bottom:50px;left:50%;transform:translateX(-50%);z-index:99;color:#fde68a;font:1000 34px Trebuchet MS;text-shadow:0 4px #020617,0 0 24px #fb923c;pointer-events:none;opacity:0;transition:opacity .15s';document.body.appendChild(e)}e.textContent=t;e.style.opacity=1;clearTimeout(window.mt);window.mt=setTimeout(()=>e.style.opacity=0,900)}const old=Fighter.prototype.special;Fighter.prototype.special=function(o){if(this.cd)return;title(this.f.move||names[this.f.n]||this.f.n+' SPECIAL');old.call(this,o)};let b=document.createElement('button');b.textContent='?';b.style.cssText='position:fixed;right:8px;bottom:8px;z-index:99;width:30px;height:30px;border-radius:999px;background:#111827;color:#facc15;border:1px solid #fff5;font-weight:1000;opacity:.45';b.onclick=()=>{if(CH.some(c=>c.n==='Speedster'))return;CH.push({grp:'Secret',n:'Speedster',c:'#ef4444',t:'Say Wallahi Bro',g:'green',sp:'smash',move:'SAY WALLAHI BRO',spd:6.2,j:15.5,w:.9});build();title('SECRET UNLOCKED: SPEEDSTER')};document.body.appendChild(b)})();`;d.body.appendChild(s)};
</script></body></html>
