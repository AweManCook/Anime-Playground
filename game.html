<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anime Arena Clash</title><style>body{margin:0;background:#07111f;color:white;font-family:system-ui;overflow:hidden}canvas{display:block;margin:86px auto 0;border:4px solid white;border-radius:14px;background:#0f172a}#ui{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:min(940px,96vw);display:flex;gap:10px}.card{flex:1;background:#0f172acc;border:1px solid #ffffff44;border-radius:14px;padding:9px}.bar{height:10px;background:#020617;border-radius:99px;overflow:hidden;margin:5px 0}.fill{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444)}#menu{position:fixed;inset:0;background:#020617ee;z-index:5;display:grid;place-items:center}.panel{width:min(1000px,94vw);max-height:92vh;overflow:auto;background:#0f172af2;border:1px solid #ffffff40;border-radius:22px;padding:22px}h1{font-size:52px;margin:0}.row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button,select{font:inherit;border:0;border-radius:12px;padding:10px 14px;color:white;background:#334155}button{font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed)}.series{margin:18px 0 8px;padding:8px 12px;border-radius:12px;background:#1e293b;font-weight:900;color:#bfdbfe}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}.fighter{background:#1e293b;border:1px solid #ffffff33;border-radius:14px;padding:12px;cursor:pointer}.p1{outline:3px solid #60a5fa}.p2{box-shadow:inset 0 0 0 3px #fb7185}.name{font-size:18px;font-weight:900}.trait{font-size:12px;color:#cbd5e1;margin-top:5px}#small{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#0f172acc;border:1px solid #ffffff33;border-radius:99px;padding:8px 14px;color:#dbeafe;font-size:13px}</style></head><body><div id="ui"><div class="card"><b id="n1">P1</b> <span id="s1">★★★</span><br>Damage: <b id="d1">0%</b><div class="bar"><div id="h1" class="fill"></div></div></div><div class="card"><b id="n2">P2</b> <span id="s2">★★★</span><br>Damage: <b id="d2">0%</b><div class="bar"><div id="h2" class="fill"></div></div></div></div><canvas id="g" width="960" height="540"></canvas><div id="small">P1: A/D move, W jump, F light, G heavy, H special. P2 PvP: arrows, / light, . heavy, , special.</div><div id="menu"><div class="panel"><h1>Anime Arena Clash</h1><p>Cleaned roster. Bad extra characters removed. Cards are cards. Gravity is gravity. Green Smash Student added.</p><div class="row"><label>Mode <select id="mode"><option value="ai" selected>Player vs AI</option><option value="pvp">2 Player PvP</option></select></label><label>AI <select id="diff"><option value="easy">Easy</option><option value="normal" selected>Normal</option><option value="hard">Hard</option></select></label></div><h3>Click once for P1, twice for P2</h3><div id="fighters"></div><div class="row"><button id="start">Start Battle</button><button id="rand" style="background:#334155">Random Fighters</button></div></div></div><script>
const canvas=document.getElementById('g'),ctx=canvas.getContext('2d'),W=960,H=540,keys={};
const F=[
['Sorcerer Battles','Limitless Ace','#60a5fa','Blindfold + blue pull','blindfold','pull'],['Sorcerer Battles','Straw Doll Striker','#b45309','Hammer + nail shots','nails','nails'],['Sorcerer Battles','Curse Vessel','#ef4444','Curse marks + domain smash','marks','domain'],
['Demon Blades','Water Blade Rookie','#0284c7','Water sword arcs','waterSword','water'],['Demon Blades','Thunder Sleeper','#eab308','Thunder dash slash','thunder','dash'],['Demon Blades','Beast Mask Brawler','#78716c','Boar mask + dual blades','boar','rush'],
['Pirate Journey','Rubber Captain','#dc2626','Straw hat + stretch fists','strawHat','rubber'],['Pirate Journey','Triple Sword Hunter','#16a34a','Three swords','swords','spin'],['Pirate Journey','Black-Leg Cook','#f59e0b','Suit + fire kicks','cook','kick'],
['Ninja Storm','Shadow Clone Ninja','#f97316','Headband + spiral orb','headband','orb'],['Ninja Storm','Red-Eye Avenger','#7c3aed','Red eye + blink blade','redEye','blink'],
['Hero Academy','Green Smash Student','#16a34a','Green lightning smash','green','smash'],['Hero Academy','Explosion Student','#f97316','Grenade gauntlets','gauntlets','rush'],['Hero Academy','Gravity Girl','#f472b6','Gravity orbs + float field','gravity','gravity'],
['Hunter Exam','Chain Hunter','#7c3aed','Chains + trap','chain','trap'],['Hunter Exam','Card Trick Magician','#ec4899','Playing cards + trick dash','cards','cards']
].map((a,i)=>({s:a[0],n:a[1],c:a[2],t:a[3],gear:a[4],sp:a[5],spd:4.7+(i%4)*.25,j:14.2+(i%3)*.4,w:.95+(i%4)*.05}));
const plats=[{x:145,y:430,w:670,h:30},{x:220,y:320,w:140,h:16},{x:600,y:320,w:140,h:16}];
let p1,p2,pick1=0,pick2=1,nextPick=1,mode='ai',diff='normal',state='menu',shots=[],zones=[];
class P{constructor(num,f,x,y){Object.assign(this,{num,f,x,y,w:34,h:62,vx:0,vy:0,dir:num===1?1:-1,dmg:0,stocks:3,jumps:2,on:false,cd:0,inv:80})}cx(){return this.x+17}cy(){return this.y+31}ctrl(){if(mode==='ai'&&this.num===2)return ai(this,p1);if(this.num===1)return{l:keys.KeyA,r:keys.KeyD,j:keys.KeyW,a:keys.KeyF,h:keys.KeyG,s:keys.KeyH};return{l:keys.ArrowLeft,r:keys.ArrowRight,j:keys.ArrowUp,a:keys.Slash,h:keys.Period,s:keys.Comma}}update(o){if(this.cd>0)this.cd--;if(this.inv>0)this.inv--;let c=this.ctrl();if(c.l){this.vx-=.8;this.dir=-1}if(c.r){this.vx+=.8;this.dir=1}this.vx=Math.max(-this.f.spd,Math.min(this.f.spd,this.vx));if(jump(this.num,c.j)&&this.jumps>0){this.vy=-this.f.j;this.jumps--}if(c.a)this.hit(o,false);if(c.h)this.hit(o,true);if(c.s)this.special(o);this.vy+=.72;this.x+=this.vx;this.y+=this.vy;this.vx*=.84;this.on=false;for(const p of plats)land(this,p);if(this.y>700||this.x<-180||this.x>1120)this.lose()}hit(o,heavy){if(this.cd>0)return;this.cd=heavy?38:14;let r=heavy?62:48,hx=this.cx()+this.dir*(heavy?54:40),hy=this.cy();if(hitBox(o,hx,hy,r)){damage(this,o,heavy?14:6,heavy?18:6,heavy)}}special(o){if(this.cd>0)return;this.cd=55;let d=this.dir,sp=this.f.sp;if(sp==='cards'){for(let i=0;i<5;i++)shots.push({own:this,x:this.cx(),y:this.cy()-20+i*8,vx:d*(8+i),vy:0,r:7,d:5,k:5})}else if(sp==='gravity'||sp==='pull'){zones.push({own:this,x:o.cx()-100,y:o.cy()-80,w:200,h:160,d:5,k:-8,life:30,pull:true})}else if(sp==='nails'){for(let i=0;i<4;i++)shots.push({own:this,x:this.cx(),y:this.cy()-20+i*10,vx:d*9,vy:-1+i*.4,r:6,d:5,k:4})}else if(sp==='rubber'){for(let i=0;i<5;i++)shots.push({own:this,x:this.cx(),y:this.cy()-20+i*10,vx:d*10,vy:0,r:10,d:4,k:3})}else if(sp==='blink'){this.x+=d*120;zones.push({own:this,x:this.cx()+d*35-55,y:this.cy()-50,w:110,h:100,d:14,k:14,life:10})}else{zones.push({own:this,x:this.cx()+d*45-60,y:this.cy()-60,w:120,h:110,d:16,k:18,life:18})}}lose(){this.stocks--;if(this.stocks<=0){state='over';alert((this.num===1?'Player 2':'Player 1')+' wins!');document.getElementById('menu').style.display='grid'}this.x=this.num===1?260:660;this.y=120;this.vx=this.vy=0;this.dmg=Math.max(0,this.dmg-35);this.inv=90}draw(){drawFighter(this)}}
function ai(a,e){let dx=e.cx()-a.cx(),ad=Math.abs(dx),rate={easy:.03,normal:.07,hard:.14}[diff]||.07;let c={};if(ad>70){c.l=dx<0;c.r=dx>0}c.j=Math.random()<.015;c.a=ad<75&&Math.random()<rate;c.h=ad<95&&Math.random()<rate/3;c.s=ad<240&&Math.random()<rate/4;return c}
function damage(a,t,d,k,heavy){if(t.inv>0)return;t.dmg+=d;t.vx+=a.dir*(k+t.dmg*.08)/t.f.w;t.vy-=k*.35+2;t.inv=heavy?15:5}
function hitBox(o,x,y,r){let nx=Math.max(o.x,Math.min(x,o.x+o.w)),ny=Math.max(o.y,Math.min(y,o.y+o.h));return Math.hypot(x-nx,y-ny)<r}
let jp={};function jump(n,v){if(v&&!jp[n]){jp[n]=1;return true}if(!v)jp[n]=0;return false}
function land(pl,p){let ok=pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>=p.y&&pl.y+pl.h<=p.y+p.h+24&&pl.vy>=0;if(ok){pl.y=p.y-pl.h;pl.vy=0;pl.on=true;pl.jumps=2}}
function stage(){world(p1?.f.s||F[pick1].s,0,W/2,'left');world(p2?.f.s||F[pick2].s,W/2,W/2,'right');ctx.fillStyle='#fff6';ctx.fillRect(W/2-2,0,4,H);ctx.fillStyle='#ef444844';ctx.fillRect(0,H-25,W,25);for(const p of plats){ctx.fillStyle=p.h>20?'#334155':'#475569';round(p.x,p.y,p.w,p.h,8);ctx.fill();ctx.fillStyle=p.h>20?'#64748b':'#94a3b8';round(p.x,p.y,p.w,8,8);ctx.fill()}}
function world(s,x,w,side){let m={'Sorcerer Battles':['#312e81','#111827'],'Demon Blades':['#0f766e','#052e16'],'Pirate Journey':['#0284c7','#0c4a6e'],'Ninja Storm':['#fb923c','#7c2d12'],'Hero Academy':['#2563eb','#111827'],'Hunter Exam':['#16a34a','#1e1b4b']}[s]||['#4c1d95','#164e63'];let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,m[0]);g.addColorStop(1,m[1]);ctx.fillStyle=g;ctx.fillRect(x,0,w,H);ctx.fillStyle='#fff2';for(let i=0;i<6;i++){ctx.beginPath();ctx.arc(x+i*90+40,230-(i%2)*40,35,0,7);ctx.fill()}ctx.fillStyle='white';ctx.font='900 18px system-ui';ctx.textAlign=side==='left'?'left':'right';ctx.fillText(s,x+(side==='left'?18:w-18),32)}
function drawFighter(p){ctx.save();ctx.translate(p.cx(),p.cy());if(p.inv>0&&Math.floor(p.inv/5)%2===0)ctx.globalAlpha=.5;ctx.fillStyle='#0005';ctx.beginPath();ctx.ellipse(0,35,30,8,0,0,7);ctx.fill();ctx.fillStyle=p.f.c;round(-17,-11,34,44,10);ctx.fill();ctx.fillStyle='#f8dcc2';ctx.beginPath();ctx.arc(0,-20,17,0,7);ctx.fill();ctx.fillStyle='#111827';for(let i=-2;i<3;i++){ctx.beginPath();ctx.moveTo(i*7,-25);ctx.lineTo(i*7+5,-45);ctx.lineTo(i*7+12,-23);ctx.fill()}gear(p);ctx.restore()}
function gear(p){let g=p.f.gear,d=p.dir;ctx.save();if(g==='blindfold'){ctx.fillStyle='#020617';ctx.fillRect(-18,-26,36,10);aura(p.f.c)}else if(g==='strawHat'){ctx.fillStyle='#facc15';ctx.beginPath();ctx.ellipse(0,-35,30,7,0,0,7);ctx.fill();ctx.fillStyle='#ca8a04';ctx.beginPath();ctx.arc(0,-37,17,Math.PI,0);ctx.fill()}else if(g==='cards'){for(let i=0;i<4;i++){ctx.fillStyle=i%2?'#ef4444':'#f8fafc';ctx.fillRect(d*(16+i*7),-2+i*5,10,14)}}else if(g==='gravity'){ctx.fillStyle='#fbcfe8';ctx.beginPath();ctx.arc(-18,10,7,0,7);ctx.arc(18,10,7,0,7);ctx.fill();aura('#f472b6')}else if(g==='green'){aura('#22c55e');ctx.strokeStyle='#86efac';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-22,-30);ctx.lineTo(-8,-43);ctx.lineTo(-12,-26);ctx.lineTo(8,-38);ctx.stroke()}else if(g==='swords'||g==='waterSword'||g==='boar'||g==='redEye'){sword(20*d,16,d,p.f.c);if(g==='swords'){sword(-20,18,-1,'#d1fae5');sword(20,18,1,'#d1fae5')}}else if(g==='nails'){ctx.fillStyle='#e5e7eb';for(let i=0;i<3;i++)ctx.fillRect(-20+i*7,18,3,12)}else if(g==='bow'||g==='chain'){ctx.strokeStyle=g==='chain'?'#cbd5e1':'#78350f';ctx.lineWidth=4;ctx.beginPath();ctx.arc(-17*d,10,25,-1.2,1.2);ctx.stroke()}else if(g==='gauntlets'||g==='explosion'){ctx.fillStyle=g==='explosion'?'#f97316':'#94a3b8';ctx.fillRect(-32,18,16,18);ctx.fillRect(16,18,16,18)}else if(g==='cook'){ctx.fillStyle='#111827';ctx.fillRect(-13,-10,26,37)}else{aura(p.f.c)}ctx.fillStyle='#020617';if(!['blindfold','boar','redEye'].includes(g))ctx.fillRect(d*4-2,-21,4,3);ctx.restore()}
function sword(a,b,d,c){ctx.strokeStyle=c;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(a,b);ctx.lineTo(a+d*32,b-28);ctx.stroke()}function aura(c){ctx.strokeStyle=c;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,10,24,.2,2.7);ctx.stroke();ctx.beginPath();ctx.arc(0,10,30,3.4,5.9);ctx.stroke()}
function updateShots(){for(let i=shots.length-1;i>=0;i--){let s=shots[i],t=s.own===p1?p2:p1;s.x+=s.vx;s.y+=s.vy;s.life=(s.life||95)-1;if(hitBox(t,s.x,s.y,s.r)){damage(s.own,t,s.d,s.k,false);shots.splice(i,1)}else if(s.life<=0)shots.splice(i,1)}}function updateZones(){for(let i=zones.length-1;i>=0;i--){let z=zones[i],t=z.own===p1?p2:p1;z.life--;if(rects(t.x,t.y,t.w,t.h,z.x,z.y,z.w,z.h)){if(z.pull){t.vx+=(z.own.cx()-t.cx())*.1;t.vy+=(z.own.cy()-t.cy())*.04}damage(z.own,t,z.d,z.k,z.rag)}if(z.life<=0)zones.splice(i,1)}}function drawShots(){for(const s of shots){ctx.fillStyle=s.own.f.c;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill()}}function drawZones(){for(const z of zones){ctx.globalAlpha=.18;ctx.fillStyle=z.own.f.c;ctx.fillRect(z.x,z.y,z.w,z.h);ctx.globalAlpha=1}}
function ui(){document.getElementById('n1').textContent=p1.f.n;document.getElementById('n2').textContent=(mode==='ai'?'AI: ':'')+p2.f.n;document.getElementById('d1').textContent=Math.floor(p1.dmg)+'%';document.getElementById('d2').textContent=Math.floor(p2.dmg)+'%';document.getElementById('s1').textContent='★'.repeat(p1.stocks);document.getElementById('s2').textContent='★'.repeat(p2.stocks);document.getElementById('h1').style.width=Math.max(0,100-p1.dmg/2)+'%';document.getElementById('h2').style.width=Math.max(0,100-p2.dmg/2)+'%'}function loop(){requestAnimationFrame(loop);ctx.clearRect(0,0,W,H);stage();if(state==='play'){p1.update(p2);p2.update(p1);updateShots();updateZones()}drawZones();drawShots();p1.draw();p2.draw();ui()}function build(){let box=document.getElementById('fighters');box.innerHTML='';[...new Set(F.map(f=>f.s))].forEach(s=>{let h=document.createElement('div');h.className='series';h.textContent=s;box.appendChild(h);let g=document.createElement('div');g.className='grid';F.forEach((f,i)=>{if(f.s!==s)return;let b=document.createElement('div');b.className='fighter';b.dataset.i=i;b.innerHTML='<div class=name>'+f.n+'</div><div class=trait>'+f.t+'</div>';b.onclick=()=>{if(nextPick===1){pick1=i;nextPick=2}else{pick2=i;nextPick=1}sel()};g.appendChild(b)});box.appendChild(g)});sel()}function sel(){document.querySelectorAll('.fighter').forEach(e=>{let i=+e.dataset.i;e.classList.toggle('p1',i===pick1);e.classList.toggle('p2',i===pick2)})}function start(){mode=document.getElementById('mode').value;diff=document.getElementById('diff').value;p1=new P(1,F[pick1],260,120);p2=new P(2,F[pick2],660,120);shots=[];zones=[];state='play';document.getElementById('menu').style.display='none'}function round(a,b,w,h,r){ctx.beginPath();ctx.moveTo(a+r,b);ctx.arcTo(a+w,b,a+w,b+h,r);ctx.arcTo(a+w,b+h,a,b+h,r);ctx.arcTo(a,b+h,a,b,r);ctx.arcTo(a,b,a+w,b,r);ctx.closePath()}function rects(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}function cl(v,a,b){return Math.max(a,Math.min(b,v))}addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='Escape'){document.getElementById('menu').style.display='grid';state='menu'}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=0);document.getElementById('start').onclick=start;document.getElementById('rand').onclick=()=>{pick1=Math.random()*F.length|0;do{pick2=Math.random()*F.length|0}while(pick2===pick1);sel()};build();p1=new P(1,F[pick1],260,120);p2=new P(2,F[pick2],660,120);loop();</script></body></html>
