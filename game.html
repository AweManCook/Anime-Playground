<!doctype html><html><head><meta charset=utf-8><meta name=viewport content='width=device-width,initial-scale=1'><title>Anime Arena Clash</title><style>body{margin:0;background:#07111f;color:white;font-family:system-ui;overflow:hidden}canvas{display:block;margin:82px auto 0;border:4px solid white;border-radius:14px;background:#0f172a}#ui{position:fixed;top:8px;left:50%;transform:translateX(-50%);width:min(970px,96vw);display:flex;gap:10px}.card{flex:1;background:#0f172acc;border:1px solid #ffffff44;border-radius:14px;padding:9px}.top{display:flex;justify-content:space-between;font-weight:900}.bar{height:10px;background:#020617;border-radius:99px;overflow:hidden;margin:4px 0}.fill{height:100%;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444)}.energy{background:linear-gradient(90deg,#38bdf8,#a78bfa)}#menu{position:fixed;inset:0;background:#020617ee;z-index:5;display:grid;place-items:center}.panel{width:min(1050px,94vw);max-height:92vh;overflow:auto;background:#0f172af2;border:1px solid #ffffff40;border-radius:22px;padding:22px}h1{margin:0;font-size:54px}.row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}button,select{font:inherit;border:0;border-radius:12px;padding:10px 14px;color:white;background:#334155}button{font-weight:900;background:linear-gradient(135deg,#2563eb,#7c3aed)}.series{margin:18px 0 8px;padding:8px 12px;border-radius:12px;background:#1e293b;font-weight:900;color:#bfdbfe}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:10px}.fighter{background:#1e293b;border:1px solid #ffffff33;border-radius:14px;padding:12px;cursor:pointer;min-height:104px}.p1{outline:3px solid #60a5fa}.p2{box-shadow:inset 0 0 0 3px #fb7185}.name{font-size:18px;font-weight:900}.trait,.move{font-size:12px;color:#cbd5e1;margin-top:5px}#msg{position:fixed;inset:0;display:grid;place-items:center;font-size:54px;font-weight:1000;text-shadow:0 5px #020617;pointer-events:none;opacity:0}#small{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#0f172acc;border:1px solid #ffffff33;border-radius:99px;padding:8px 14px;color:#dbeafe;font-size:13px}</style></head><body><div id=ui><div class=card><div class=top><span id=n1>P1</span><span id=s1>★★★</span></div>Damage: <b id=d1>0%</b><div class=bar><div id=h1 class=fill></div></div>Energy<div class=bar><div id=e1 class='fill energy'></div></div><div id=c1></div></div><div class=card><div class=top><span id=n2>P2</span><span id=s2>★★★</span></div>Damage: <b id=d2>0%</b><div class=bar><div id=h2 class=fill></div></div>Energy<div class=bar><div id=e2 class='fill energy'></div></div><div id=c2></div></div></div><canvas id=g width=960 height=540></canvas><div id=msg></div><div id=small>P1: A/D/W/S + F/G/H/T. P2 PvP: arrows, /, ., comma, Shift.</div><div id=menu><div class=panel><h1>Anime Arena Clash</h1><p>Corrected roster: cards are cards, gravity is gravity, and Green Smash Student is added.</p><div class=row><label>Mode <select id=mode><option value=ai selected>Player vs AI</option><option value=pvp>2 Player PvP</option></select></label><label>AI <select id=diff><option value=training>Training</option><option value=beginner selected>Beginner</option><option value=easy>Easy</option><option value=normal>Normal</option><option value=hard>Hard</option></select></label></div><h3>Click once for P1, twice for P2</h3><div id=fighters></div><div class=row><button id=start>Start Battle</button><button id=rand style=background:#334155>Random Fighters</button></div></div></div><script>const C=document.getElementById('g'),x=C.getContext('2d'),W=960,H=540,$=id=>document.getElementById(id),keys={},G=.72,FR=.84;const R=[['Sorcerer Battles','Limitless Ace','#60a5fa','#dbeafe','blindfold + blue pull','pull','blindfold'],['Sorcerer Battles','Straw Doll Striker','#b45309','#fde68a','hammer + nails','nails','nails'],['Sorcerer Battles','Curse Vessel','#ef4444','#fecaca','curse marks + domain','domain','marks'],['Demon Blades','Water Blade Rookie','#0284c7','#bae6fd','water sword arcs','water','waterSword'],['Demon Blades','Thunder Sleeper','#eab308','#fef08a','yellow cloak dash','thunder','thunderCloak'],['Demon Blades','Beast Mask Brawler','#78716c','#e7e5e4','boar mask + blades','beast','boar'],['Pirate Journey','Rubber Captain','#dc2626','#fecaca','straw hat + stretch fists','rubber','strawHat'],['Pirate Journey','Triple Sword Hunter','#16a34a','#bbf7d0','three swords','swords','threeSwords'],['Pirate Journey','Black-Leg Cook','#f59e0b','#fed7aa','suit + fire kicks','kick','cook'],['Ninja Storm','Shadow Clone Ninja','#f97316','#fed7aa','headband + spiral orb','spiral','headband'],['Ninja Storm','Red-Eye Avenger','#7c3aed','#c4b5fd','red eye + lightning blade','blink','redEye'],['Soul Arena','Spirit Archer','#22c55e','#bbf7d0','bow + spirit arrows','snare','bow'],['Soul Arena','Titan Brawler','#64748b','#e5e7eb','gauntlets + armor','breaker','gauntlets'],['Hero Academy','Green Smash Student','#16a34a','#86efac','green lightning smash','breaker','greenSmash'],['Hero Academy','Explosion Student','#f97316','#fed7aa','grenade gauntlets','beast','explosion'],['Hero Academy','Gravity Girl','#f472b6','#fbcfe8','gravity orbs + float field','gravity','gravity'],['Hero Academy','Ice-Fire Prodigy','#38bdf8','#fecaca','half ice + half fire','cage','iceFire'],['Hunter Exam','Chain Hunter','#7c3aed','#ddd6fe','chain jail trap','snare','chain'],['Hunter Exam','Card Trick Magician','#ec4899','#fbcfe8','playing cards + trick dash','cards','cards']];const F=R.map((a,i)=>({s:a[0],n:a[1],col:a[2],au:a[3],t:a[4],k:a[5],gear:a[6],sp:a[4],spd:4.7+(i%4)*.18,j:14.4+(i%3)*.35,w:.92+(i%5)*.06}));const A={training:.025,beginner:.06,easy:.1,normal:.16,hard:.25},plats=[{x:145,y:430,w:670,h:30},{x:210,y:320,w:155,h:16},{x:595,y:320,w:155,h:16}];let p1,p2,pick1=0,pick2=1,nextPick=1,mode='ai',diff='beginner',state='menu',shots=[],zones=[],fx=[],msgT=0,frame=0;class P{constructor(num,f,x,y){Object.assign(this,{num,f,x,y,w:34,h:62,vx:0,vy:0,dir:num==1?1:-1,dmg:0,en:70,stocks:3,jumps:2,on:false,stun:0,rag:0,inv:90,atk:0,spcd:0,dash:0,anim:0,combo:0,comboDmg:0,comboT:0,ai:{}})}cx(){return this.x+this.w/2}cy(){return this.y+this.h/2}ctrl(){if(mode==='ai'&&this.num===2)return this.ai;if(this.num===1)return{l:keys.KeyA,r:keys.KeyD,j:keys.KeyW,sh:keys.KeyS,li:keys.KeyF,he:keys.KeyG,sp:keys.KeyH,da:keys.KeyT};return{l:keys.ArrowLeft,r:keys.ArrowRight,j:keys.ArrowUp,sh:keys.ArrowDown,li:keys.Slash,he:keys.Period,sp:keys.Comma,da:keys.ShiftLeft||keys.ShiftRight}}update(o){tick(this);if(mode==='ai'&&this.num===2)think(this,o);let k=this.ctrl();if(this.stun<=0&&this.rag<=0){let a=.82;if(k.l){this.vx-=a;this.dir=-1}if(k.r){this.vx+=a;this.dir=1}this.vx=cl(this.vx,-this.f.spd,this.f.spd);if(jp(this.num,k.j)&&this.jumps>0){this.vy=-this.f.j;this.jumps--}if(k.da&&this.dash<=0&&this.en>14){this.vx+=this.dir*13;this.en-=14;this.dash=42}if(k.li)this.attack(o,false);if(k.he)this.attack(o,true);if(k.sp)this.special(o)}this.vy+=G;this.x+=this.vx;this.y+=this.vy;this.vx*=this.rag>0?.98:FR;this.on=false;for(const p of plats)land(this,p);if(this.y>H+150||this.x<-170||this.x>W+170)this.lose()}attack(o,heavy){if(this.atk>0)return;this.atk=heavy?45:14;this.anim=heavy?20:10;hitTry(this,o,heavy?76:56,heavy?46:34,heavy?15:6,heavy?20:4,heavy?16:28,heavy)}special(o){if(this.spcd>0||this.en<34)return;this.en-=34;this.spcd=60;this.anim=24;let d=this.dir,k=this.f.k;if(k==='gravity'||k==='pull')zone(this,o.cx()-110,o.cy()-85,220,170,28,6,-8,55,false,true);if(k==='cards'){for(let i=0;i<5;i++)setTimeout(()=>shot(this,this.cx()+d*28,this.cy()-24+i*10,d*(10+i*.5),-1+i*.25,7,5,4,24,false),i*55);this.x+=d*55}if(k==='nails')for(let i=0;i<4;i++)setTimeout(()=>shot(this,this.cx()+d*32,this.cy()-25+i*13,d*10,-1+i*.25,6,5,3,28,false),i*65);if(k==='rubber')for(let i=0;i<5;i++)setTimeout(()=>shot(this,this.cx()+d*25,this.cy()-20+i*10,d*10,0,10,4,3,20,false),i*45);if(k==='swords')zone(this,this.cx()-85,this.cy()-80,170,160,34,5,4,18,false);if(k==='breaker'){this.vx+=d*7;zone(this,this.cx()+d*35-55,this.cy()-55,110,110,16,20,28,10,true)}if(k==='snare')zone(this,this.cx()+d*120-35,this.cy()-20,70,90,85,6,2,60,false);if(k==='blink'){this.x+=d*115;zone(this,this.cx()+d*35-55,this.cy()-50,110,95,14,15,14,34,false)}if(k==='water'||k==='kick'||k==='thunder'||k==='beast'||k==='spiral'||k==='cage'||k==='domain')zone(this,this.cx()+d*55-65,this.cy()-60,130,110,24,12,12,36,k==='kick'||k==='thunder')}lose(){this.stocks--;if(this.stocks<=0){show(this.num===1?'Player 2 Wins!':'Player 1 Wins!',9999);state='over';return}Object.assign(this,{x:this.num===1?260:660,y:120,vx:0,vy:0,dmg:Math.max(0,this.dmg-35),en:70,inv:120,stun:0,rag:0})}draw(){drawPlayer(this)}}function tick(p){['inv','stun','rag','atk','spcd','dash','anim','comboT'].forEach(k=>{if(p[k]>0)p[k]--});if(!p.comboT){p.combo=0;p.comboDmg=0}p.en=Math.min(100,p.en+.1)}function think(a,e){let dx=e.cx()-a.cx(),ad=Math.abs(dx),rate=A[diff]||.06,q={};if(a.cx()<145)q.r=1;else if(a.cx()>815)q.l=1;else if(ad>70){q.l=dx<0;q.r=dx>0}if(dx)a.dir=Math.sign(dx);q.j=Math.random()<.02;q.li=ad<88&&Math.random()<rate;q.he=ad<110&&Math.random()<rate/3;q.sp=ad<250&&a.en>36&&Math.random()<rate/3;q.da=ad>160&&ad<300&&Math.random()<rate/5;if(diff==='training'){q.he=q.sp=q.da=false}a.ai=q}function world(s,x0,w,side){let m={'Sorcerer Battles':['#312e81','#111827'],'Demon Blades':['#0f766e','#052e16'],'Pirate Journey':['#0284c7','#0c4a6e'],'Ninja Storm':['#fb923c','#7c2d12'],'Soul Arena':['#4c1d95','#164e63'],'Hero Academy':['#2563eb','#111827'],'Hunter Exam':['#16a34a','#1e1b4b']}[s]||['#1e293b','#020617'];let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,m[0]);g.addColorStop(1,m[1]);x.fillStyle=g;x.fillRect(x0,0,w,H);x.fillStyle='#ffffff22';for(let i=0;i<6;i++){x.beginPath();x.arc(x0+i*90+40,230-(i%2)*40,35,0,7);x.fill()}x.fillStyle='white';x.font='900 18px system-ui';x.textAlign=side==='left'?'left':'right';x.fillText(s,x0+(side==='left'?18:w-18),32)}function stage(){world(p1?.f.s||F[pick1].s,0,W/2,'left');world(p2?.f.s||F[pick2].s,W/2,W/2,'right');x.fillStyle='#ffffff66';x.fillRect(W/2-2,0,4,H);x.fillStyle='#ef444844';x.fillRect(0,H-26,W,26);for(const p of plats){x.fillStyle=p.h>20?'#334155':'#475569';rr(p.x,p.y,p.w,p.h,8);x.fill();x.fillStyle=p.h>20?'#64748b':'#94a3b8';rr(p.x,p.y,p.w,8,8);x.fill()}}function drawPlayer(p){x.save();x.translate(p.cx(),p.cy());if(p.inv>0&&Math.floor(p.inv/5)%2===0)x.globalAlpha=.45;x.fillStyle='#0005';x.beginPath();x.ellipse(0,35,30,8,0,0,7);x.fill();x.fillStyle=p.f.col;rr(-17,-11,34,44,10);x.fill();x.fillStyle='#f8dcc2';x.beginPath();x.arc(0,-20,17,0,7);x.fill();x.fillStyle='#111827';for(let i=-2;i<3;i++){x.beginPath();x.moveTo(i*7,-25);x.lineTo(i*7+5,-45);x.lineTo(i*7+12,-23);x.fill()}gear(p);if(p.anim>0){x.strokeStyle=p.f.au;x.lineWidth=5;x.beginPath();x.moveTo(0,5);x.lineTo(p.dir*(55+p.anim),-5);x.stroke()}x.restore()}function gear(p){let g=p.f.gear,d=p.dir;x.save();if(g==='blindfold'){x.fillStyle='#020617';x.fillRect(-18,-26,36,10);aura(0,8,p.f.au)}else if(g==='strawHat'){x.fillStyle='#facc15';x.beginPath();x.ellipse(0,-35,30,7,0,0,7);x.fill();x.fillStyle='#ca8a04';x.beginPath();x.arc(0,-37,17,Math.PI,0);x.fill()}else if(g==='cards'){for(let i=0;i<4;i++){x.fillStyle=i%2?'#ef4444':'#f8fafc';x.fillRect(d*(16+i*7),-2+i*5,10,14)}}else if(g==='gravity'){x.fillStyle='#fbcfe8';x.beginPath();x.arc(-18,10,7,0,7);x.arc(18,10,7,0,7);x.fill();aura(0,12,'#f472b6')}else if(g==='greenSmash'){aura(0,10,'#22c55e');x.strokeStyle='#86efac';x.lineWidth=3;x.beginPath();x.moveTo(-22,-30);x.lineTo(-8,-43);x.lineTo(-12,-26);x.lineTo(8,-38);x.stroke()}else if(g==='threeSwords'||g==='waterSword'||g==='boar'||g==='redEye'){sword(20*d,16,d,p.f.au);if(g==='threeSwords'){sword(-20,18,-1,'#d1fae5');sword(20,18,1,'#d1fae5')}if(g==='boar'){x.fillStyle='#a8a29e';x.beginPath();x.arc(0,-20,20,0,7);x.fill()}}else if(g==='nails'){x.fillStyle='#e5e7eb';for(let i=0;i<3;i++)x.fillRect(-20+i*7,18,3,12)}else if(g==='bow'||g==='chain'){x.strokeStyle=g==='chain'?'#cbd5e1':'#78350f';x.lineWidth=4;x.beginPath();x.arc(-17*d,10,25,-1.2,1.2);x.stroke()}else if(g==='gauntlets'||g==='explosion'){x.fillStyle=g==='explosion'?'#f97316':'#94a3b8';x.fillRect(-32,18,16,18);x.fillRect(16,18,16,18)}else if(g==='cook'){x.fillStyle='#111827';x.fillRect(-13,-10,26,37)}else aura(0,10,p.f.au);x.fillStyle='#020617';if(!['blindfold','boar','redEye'].includes(g))x.fillRect(d*4-2,-21,4,3);x.restore()}function sword(a,b,d,col){x.strokeStyle=col;x.lineWidth=4;x.beginPath();x.moveTo(a,b);x.lineTo(a+d*32,b-28);x.stroke()}function aura(c,y,col){x.strokeStyle=col;x.lineWidth=3;x.beginPath();x.arc(c,y,24,.2,2.7);x.stroke();x.beginPath();x.arc(c,y,30,3.4,5.9);x.stroke()}function hitTry(a,o,range,r,d,k,st,rag){let hx=a.cx()+a.dir*range,hy=a.cy()-5;if(hitBox(o,hx,hy,r))hit(a,o,d,k,st,rag,a.dir)}function hit(a,t,d,k,st,rag,dir){if(t.inv>0)return;let fd=d;t.dmg+=fd;t.combo++;t.comboDmg+=fd;t.comboT=95;let kb=(Math.abs(k)+t.dmg*.09+(rag?t.combo*1.8:0))/t.f.w;t.vx+=(k<0?-dir:dir)*kb;t.vy-=kb*.42+2;t.stun=rag?0:Math.max(t.stun,Math.floor(st+t.combo*3));t.rag=rag?60:0;t.inv=rag?16:5;a.en=Math.min(100,a.en+7)}let J={};function jp(n,w){if(w&&!J[n]){J[n]=1;return 1}if(!w)J[n]=0;return 0}function shot(own,x,y,vx,vy,r,d,k,st,rag){shots.push({own,x,y,vx,vy,r,d,k,st,rag,life:95,c:own.f.au})}function zone(own,x,y,w,h,life,d,k,st,rag,tick=0,pull=false){zones.push({own,x,y,w,h,life,d,k,st,rag,tick,pull,c:own.f.au})}function updateShots(){for(let i=shots.length-1;i>=0;i--){let s=shots[i],t=s.own===p1?p2:p1;s.x+=s.vx;s.y+=s.vy;s.life--;if(hitBox(t,s.x,s.y,s.r)){hit(s.own,t,s.d,s.k,s.st,s.rag,Math.sign(s.vx)||s.own.dir);shots.splice(i,1)}else if(s.life<=0)shots.splice(i,1)}}function updateZones(){for(let i=zones.length-1;i>=0;i--){let z=zones[i],t=z.own===p1?p2:p1;z.life--;if(rects(t.x,t.y,t.w,t.h,z.x,z.y,z.w,z.h)){if(z.pull){t.vx+=(z.own.cx()-t.cx())*.1;t.vy+=(z.own.cy()-t.cy())*.04}hit(z.own,t,z.d,z.k,z.st,z.rag,Math.sign(t.cx()-z.own.cx())||z.own.dir)}if(z.life<=0)zones.splice(i,1)}}function land(pl,p){let ok=pl.x+pl.w>p.x&&pl.x<p.x+p.w&&pl.y+pl.h>=p.y&&pl.y+pl.h<=p.y+p.h+24&&pl.vy>=0;if(ok){pl.y=p.y-pl.h;pl.vy=0;pl.on=1;pl.jumps=2}}function drawShots(){for(const s of shots){x.fillStyle=s.c;x.beginPath();x.arc(s.x,s.y,s.r,0,7);x.fill()}}function drawZones(){for(const z of zones){x.globalAlpha=.18;x.fillStyle=z.c;x.fillRect(z.x,z.y,z.w,z.h);x.globalAlpha=1}}function ui(){if(!p1||!p2)return;$('n1').textContent=p1.f.n;$('n2').textContent=(mode==='ai'?'AI '+diff.toUpperCase()+': ':'')+p2.f.n;$('d1').textContent=p1.dmg|0+'%';$('d2').textContent=p2.dmg|0+'%';$('s1').textContent='★'.repeat(p1.stocks);$('s2').textContent='★'.repeat(p2.stocks);$('h1').style.width=cl(100-p1.dmg/2,0,100)+'%';$('h2').style.width=cl(100-p2.dmg/2,0,100)+'%';$('e1').style.width=p1.en+'%';$('e2').style.width=p2.en+'%';$('c1').textContent=p1.combo>=2?p1.combo+' hit combo':'';$('c2').textContent=p2.combo>=2?p2.combo+' hit combo':''}function loop(){requestAnimationFrame(loop);frame++;x.clearRect(0,0,W,H);stage();if(state==='play'){p1.update(p2);p2.update(p1);updateShots();updateZones()}drawZones();drawShots();p1?.draw();p2?.draw();ui()}function build(){let box=$('fighters');box.innerHTML='';[...new Set(F.map(f=>f.s))].forEach(s=>{let h=document.createElement('div');h.className='series';h.textContent=s;box.appendChild(h);let g=document.createElement('div');g.className='grid';F.forEach((f,i)=>{if(f.s!==s)return;let b=document.createElement('div');b.className='fighter';b.dataset.i=i;b.innerHTML='<div class=name>'+f.n+'</div><div class=trait>'+f.t+'</div><div class=move>Special: '+f.sp+'</div>';b.onclick=()=>{if(nextPick===1){pick1=i;nextPick=2}else{pick2=i;nextPick=1}sel()};g.appendChild(b)});box.appendChild(g)});sel()}function sel(){document.querySelectorAll('.fighter').forEach(e=>{let i=+e.dataset.i;e.classList.toggle('p1',i===pick1);e.classList.toggle('p2',i===pick2)})}function start(){mode=$('mode').value;diff=$('diff').value;p1=new P(1,F[pick1],260,120);p2=new P(2,F[pick2],660,120);shots=[];zones=[];state='play';$('menu').style.display='none'}function show(t,n=90){$('msg').innerHTML=t;$('msg').style.opacity=1;setTimeout(()=>$('msg').style.opacity=0,n*16)}function cl(v,a,b){return Math.max(a,Math.min(b,v))}function dist(a,b,c,d){return Math.hypot(c-a,d-b)}function hitBox(o,x0,y0,r){let nx=cl(x0,o.x,o.x+o.w),ny=cl(y0,o.y,o.y+o.h);return dist(x0,y0,nx,ny)<=r}function rects(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}function rr(x0,y0,w,h,r){x.beginPath();x.moveTo(x0+r,y0);x.arcTo(x0+w,y0,x0+w,y0+h,r);x.arcTo(x0+w,y0+h,x0,y0+h,r);x.arcTo(x0,y0+h,x0,y0,r);x.arcTo(x0,y0,x0+w,y0,r);x.closePath()}addEventListener('keydown',e=>{keys[e.code]=1;if(e.code==='Escape'){$('menu').style.display='grid';state='menu'}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>keys[e.code]=0);$('start').onclick=start;$('rand').onclick=()=>{pick1=Math.random()*F.length|0;do{pick2=Math.random()*F.length|0}while(pick2===pick1);sel()};$('mute').onclick=()=>{};build();p1=new P(1,F[pick1],260,120);p2=new P(2,F[pick2],660,120);loop();</script></body></html>
