<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Anime Arena Clash Fixed</title><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050816}iframe{width:100%;height:100%;border:0}</style></head><body><iframe id="game" src="combat.html"></iframe><script>
const patch=`
(function(){
  const oldHit = hit;
  window.hit = function(at,t,d,k,st,rag){
    if(t.inv && st < 30) return;
    oldHit(at,t,d,k,st,rag);
    if(!rag){ t.inv = 2; t.stun = Math.max(t.stun||0, st||30); }
    if(at && t){ showComboText(at,t); }
  };
  const oldAttack = Fighter.prototype.attack;
  Fighter.prototype.attack = function(o,heavy){
    if(this.cd) return;
    this.cd = heavy ? 38 : 9;
    let w = heavy ? 92 : 76, h = heavy ? 54 : 44, ox = heavy ? 38 : 18;
    let rx = this.dir > 0 ? this.cx()+ox : this.cx()-ox-w;
    let ry = this.cy()-h/2;
    box(rx,ry,w,h,heavy?'#fb7185':'#fde68a',10);
    let bodyX=this.x-16, bodyY=this.y-8, bodyW=this.w+32, bodyH=this.h+16;
    box(bodyX,bodyY,bodyW,bodyH,'#fef08a',10);
    slash(this.cx()+this.dir*42,this.cy(),this.f.c,heavy);
    if(rect(o.x,o.y,o.w,o.h,rx,ry,w,h)||rect(o.x,o.y,o.w,o.h,bodyX,bodyY,bodyW,bodyH)){
      hit(this,o,heavy?16:5,heavy?25:5,heavy?7:34,heavy);
    }
  };
  const oldSpecial = Fighter.prototype.special;
  Fighter.prototype.special = function(o){
    if(this.cd) return;
    bottomCall(this.f.move || this.f.n + ' SPECIAL');
    oldSpecial.call(this,o);
  };
  const oldDrawF = drawF;
  window.drawF = function(p){
    oldDrawF(p);
    if(p.stun>0 || p.broken){
      X.save();
      X.translate(p.cx(),p.cy());
      X.strokeStyle = p.broken ? '#fb7185' : '#fde68a';
      X.lineWidth = 4;
      X.beginPath();
      X.arc(0,0,48+Math.sin(Date.now()/80)*5,0,Math.PI*2);
      X.stroke();
      X.font='900 18px Trebuchet MS';
      X.textAlign='center';
      X.fillStyle = p.broken ? '#fb7185' : '#fde68a';
      X.strokeStyle='#020617';
      X.lineWidth=5;
      let label = p.broken ? 'BROKEN' : ('STUN '+p.stun);
      X.strokeText(label,0,-55);
      X.fillText(label,0,-55);
      X.restore();
    }
  };
  function showComboText(at,t){
    if(!window.__comboTexts) window.__comboTexts=[];
    window.__comboTexts.push({txt:at.combo+' HIT',x:t.cx(),y:t.y-20,c:at.f.c,l:45});
  }
  function bottomCall(txt){
    let e=document.getElementById('specialCall');
    if(!e){
      e=document.createElement('div');
      e.id='specialCall';
      e.style.cssText='position:fixed;bottom:48px;left:50%;transform:translateX(-50%);z-index:9;font:1000 34px Trebuchet MS;color:#fde68a;text-shadow:0 4px #020617,0 0 24px #fb923c;pointer-events:none;transition:opacity .15s;opacity:0';
      document.body.appendChild(e);
    }
    e.textContent=txt;
    e.style.opacity=1;
    clearTimeout(window.__callTimer);
    window.__callTimer=setTimeout(()=>e.style.opacity=0,900);
  }
  const oldDrawExtras = drawExtras;
  window.drawExtras = function(){
    oldDrawExtras();
    let arr=window.__comboTexts||[];
    for(let i=arr.length-1;i>=0;i--){
      let t=arr[i]; t.y-=.8; t.l--;
      X.save(); X.globalAlpha=t.l/45; X.font='900 24px Trebuchet MS'; X.fillStyle=t.c; X.strokeStyle='#020617'; X.lineWidth=6; X.strokeText(t.txt,t.x-32,t.y); X.fillText(t.txt,t.x-32,t.y); X.restore();
      if(t.l<=0) arr.splice(i,1);
    }
  };
})();
`;
const f=document.getElementById('game');
f.onload=()=>{
  const s=f.contentDocument.createElement('script');
  s.textContent=patch;
  f.contentDocument.body.appendChild(s);
};
</script></body></html>
